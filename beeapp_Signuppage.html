<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" type="text/css" href="beeapp.css">
	<link rel="icon" type="image/png" href="chidi logo.png" sizes="32x32">
	<script type="beeapp.js"></script>
	<title>Sign up</title>
</head>
<body>
	<div class="card2">
	<form>
		<h1 class="brand-title">beeapp</h1>
		<p class="intro">Sign up for beeapp</p>

		<div class="field">
			<label for="firstName">First Name</label>
			<input id="firstName" type="text" placeholder="First Name" required>
		</div>

		<div class="field">
			<label for="middleName">Middle Name</label>
			<input id="middleName" type="text" placeholder="Middle Name" required>
		</div>

		<div class="field">
			<label for="lastName">Last Name</label>
			<input id="lastName" type="text" placeholder="Last Name" required>
		</div>

		<div class="field">
			<label for="contact">Phone number or email address</label>
			<input id="contact" type="text" placeholder="Phone number or email address" required>
		</div>

		<div class="field">
			<label>Gender</label>
			<div>
				<label><input type="radio" name="gender" value="male" required> Male</label>
				<label><input type="radio" name="gender" value="female" required> Female</label>
				<label><input type="radio" name="gender" value="custom" required> Custom</label>
			</div>
			<p><i>Select Custom to choose another gender, or if you'd rather not say.</i></p>
		</div>

		<div class="field">
			<label for="dob">Date of Birth</label>
			<input id="dob" type="date" required>
		</div>

		<div class="field">
			<label for="password">New Password</label>
			<input id="password" type="password" placeholder="Password" required>
		</div>

		<div class="secondary">
			<p>By tapping Sign Up, you agree to our Terms, Data Policy and Cookie Policy. You may receive SMS notifications from us and can opt out at any time.</p>
			<p><button class="btn-primary" type="submit">Sign Up</button></p>
			<p><button type="button" class="btn-primary2" onclick="location.href='index.html'">Already have an account?</button></p>
		</div>
	</form>
	</div>
</body>
</html>
