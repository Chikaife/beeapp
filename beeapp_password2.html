<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="icon" type="image/png" href="chidi logo.png" sizes="32x32">
	<link rel="stylesheet" type="text/css" href="beeapp.css">
	<script src="beeapp.js" defer></script>
	<script src="dare.js" defer></script>
	<title>Forgotten Password</title>
</head>
<body>
	<div class="card">
	<main class="container">
		<form class="forgot-form" action="#" method="post">
			<h1 class="brand-title">beeapp</h1>
			<p class="instruction"><strong>Enter your email address</strong></p>

			<div class="field">
				<label for="email" class="sr-only">Email address</label>
				<input id="email" name="email" type="email" class="input input-email" placeholder="Email address" required>
			</div>

			<div class="form-actions">
				<button type="button" class="btn-primary2" onclick="location.href='index.html'">Cancel</button>
				<p><button type="submit" class="btn btn-primary">Search</button></p>
			</div>

			<p class="alt-link"><button type="button" class="btn-primary2" onclick="location.href='beeapp_password1.html'">Search by your mobile number instead</button></p>
		</form>
	</main>
	</div>
</body>
</html>
